<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ORBIT HOARDER</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #05060f; overflow: hidden; touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #c { display: block; width: 100vw; height: 100vh; }
  #score {
    position: fixed; top: 6%; left: 0; right: 0; text-align: center;
    color: #fff; font-weight: 800; font-size: 22vw; line-height: 1;
    text-shadow: 0 0 20px rgba(120,180,255,0.8), 0 0 40px rgba(120,180,255,0.4);
    pointer-events: none; z-index: 10;
    font-variant-numeric: tabular-nums;
    transform-origin: center;
  }
  #label {
    position: fixed; top: 3%; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,0.55); font-weight: 600; font-size: 4vw;
    letter-spacing: 0.3em; pointer-events: none; z-index: 10;
  }
  #hint {
    position: fixed; bottom: 6%; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,0.5); font-size: 4.5vw; font-weight: 600;
    pointer-events: none; z-index: 10;
  }
  #lives {
    position: fixed; top: 9%; left: 0; right: 0; text-align: center;
    font-size: 5vw; letter-spacing: 0.2em; pointer-events: none; z-index: 10;
  }
  #gameover {
    position: fixed; top: 38%; left: 0; right: 0; text-align: center;
    color: #ff8f6b; font-weight: 800; font-size: 9vw; letter-spacing: 0.1em;
    pointer-events: none; z-index: 11; opacity: 0; text-shadow: 0 0 20px rgba(255,100,60,0.6);
  }
  #energy {
    position: fixed; bottom: 12%; left: 0; right: 0; text-align: center;
    color: #7fd3ff; font-weight: 700; font-size: 4.4vw; letter-spacing: 0.12em;
    pointer-events: none; z-index: 10; font-variant-numeric: tabular-nums;
    text-shadow: 0 0 14px rgba(120,180,255,0.5);
  }
</style>
</head>
<body>
<div id="label">SATELLITES</div>
<div id="lives"></div>
<div id="score">0</div>
<div id="gameover">GAME OVER</div>
<div id="energy"></div>
<div id="hint">TAP TO PLACE A SATELLITE</div>
<canvas id="c"></canvas>
<script>
(function () {
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var scoreEl = document.getElementById('score');
  var hintEl = document.getElementById('hint');
  var livesEl = document.getElementById('lives');
  var gameoverEl = document.getElementById('gameover');
  var energyEl = document.getElementById('energy');

  // cap DPR at 2 so low-end phones don't push a huge backing canvas every frame
  var W = 0, H = 0, cx = 0, cy = 0, DPR = Math.min(2, Math.max(1, window.devicePixelRatio || 1));
  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * DPR; canvas.height = H * DPR;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    cx = W / 2; cy = H / 2;
  }
  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', resize);
  resize();

  // technique from sasha240100/between.js (mit) - tiny tween helper serviced by the rAF loop
  var activeTweens = [];
  function easeLinear(p) { return p; }
  function easeOutQuad(p) { return 1 - (1 - p) * (1 - p); }
  function easeOutBack(p) {
    var c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(p - 1, 3) + c1 * Math.pow(p - 1, 2);
  }
  function tween(obj, target, duration, ease) {
    var start = {};
    for (var k in target) start[k] = obj[k];
    var tw = { obj: obj, start: start, target: target, duration: duration, elapsed: 0, ease: ease || easeLinear };
    activeTweens.push(tw);
    return tw;
  }
  function updateTweens(dt) {
    for (var i = activeTweens.length - 1; i >= 0; i--) {
      var tw = activeTweens[i];
      tw.elapsed += dt;
      var p = Math.min(1, tw.elapsed / tw.duration);
      var e = tw.ease(p);
      for (var k in tw.target) tw.obj[k] = tw.start[k] + (tw.target[k] - tw.start[k]) * e;
      if (p >= 1) activeTweens.splice(i, 1);
    }
  }

  // technique from keithwhor/audiosynth (mit) - oscillator + ADSR gain envelope, no audio files
  var actx = null;
  function ensureAudio() {
    if (!actx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (AC) actx = new AC();
    }
    if (actx && actx.state === 'suspended') actx.resume();
  }
  function synth(freq, opts) {
    if (!actx) return;
    opts = opts || {};
    var type = opts.type || 'sine';
    var attack = opts.attack != null ? opts.attack : 0.01;
    var decay = opts.decay != null ? opts.decay : 0.08;
    var sustain = opts.sustain != null ? opts.sustain : 0.4;
    var hold = opts.hold != null ? opts.hold : 0.02;
    var release = opts.release != null ? opts.release : 0.12;
    var peak = opts.gain != null ? opts.gain : 0.15;
    var t0 = actx.currentTime;
    var osc = actx.createOscillator();
    var g = actx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    if (opts.freqEnd != null) osc.frequency.exponentialRampToValueAtTime(Math.max(1, opts.freqEnd), t0 + attack + decay);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(peak, t0 + attack);
    g.gain.linearRampToValueAtTime(peak * sustain, t0 + attack + decay);
    var releaseStart = t0 + attack + decay + hold;
    g.gain.setValueAtTime(peak * sustain, releaseStart);
    g.gain.exponentialRampToValueAtTime(0.001, releaseStart + release);
    osc.connect(g); g.connect(actx.destination);
    osc.start(t0); osc.stop(releaseStart + release + 0.02);
  }

  // ---- state ----
  var satellites = []; // {orbitR, angle, speed, size}
  var debris = [];     // {x, y, r, vAngle}
  var score = 0;
  var running = true;
  var t = 0;
  var MAX_LIVES = 3;
  var lives = MAX_LIVES;
  var state = 'playing'; // 'playing' | 'gameover'
  var flashAlpha = 0;

  // ---- energy (터치 무제한 방지: 발사에 에너지 소모) ----
  var START_ENERGY = 3, ENERGY_MAX = 12, LOW_ENERGY = 4;
  var energy = START_ENERGY;
  var regenTimer = 0;
  function launchCost() { return 1 + Math.floor(satellites.length / 2); } // 1,1,2,2,3,3...
  function renderEnergy() {
    energyEl.textContent = '⚡ ' + Math.floor(energy) + '   ·   NEXT ' + launchCost();
    energyEl.style.color = energy < launchCost() ? '#ff8f6b' : '#7fd3ff';
  }

  var BASE_R = 46;
  var ORBIT_GAP = 26;

  var shake = { mag: 0 };
  function triggerShake(mag, duration) {
    shake.mag = mag;
    tween(shake, { mag: 0 }, duration || 0.35, easeOutQuad);
  }
  var scorePop = { scale: 1 };
  function popScore() {
    scorePop.scale = 1.22;
    tween(scorePop, { scale: 1 }, 0.28, easeOutBack);
  }

  function renderLives() {
    var s = '';
    for (var i = 0; i < MAX_LIVES; i++) {
      s += i < lives ? '●' : '○';
      if (i < MAX_LIVES - 1) s += ' ';
    }
    livesEl.innerHTML = s;
    livesEl.style.color = lives <= 1 ? '#ff8f6b' : 'rgba(255,255,255,0.6)';
  }

  function miss() {
    lives -= 1;
    flashAlpha = 0.35;
    triggerShake(14, 0.4);
    synth(140, { type: 'sawtooth', freqEnd: 55, attack: 0.005, decay: 0.15, sustain: 0.5, release: 0.2, gain: 0.18 });
    renderLives();
    if (lives <= 0) triggerGameOver();
  }

  function triggerGameOver() {
    state = 'gameover';
    gameoverEl.style.opacity = '1';
    hintEl.textContent = 'FINAL ' + score + ' — TAP TO RESTART';
    hintEl.style.opacity = '1';
  }

  function restart() {
    satellites = [];
    debris = [];
    particles = [];
    activeTweens = [];
    shake.mag = 0;
    scorePop.scale = 1;
    scoreEl.style.transform = 'scale(1)';
    score = 0;
    lives = MAX_LIVES;
    energy = START_ENERGY;
    regenTimer = 0;
    t = 0;
    scoreEl.textContent = '0';
    gameoverEl.style.opacity = '0';
    hintEl.textContent = 'TAP TO PLACE A SATELLITE';
    hintEl.style.opacity = '1';
    renderLives();
    renderEnergy();
    state = 'playing';
  }

  // 탭한 위치가 위성의 궤도 반지름과 시작 각도를 결정한다 (운 아니라 조준).
  function addSatellite(tx, ty) {
    ensureAudio();
    var idx = satellites.length;
    var dx = tx - cx, dy = ty - cy;
    var d = Math.sqrt(dx * dx + dy * dy) || 1;
    var minR = BASE_R, maxOrbit = Math.min(W, H) * 0.5 - 16;
    var orbitR = Math.max(minR, Math.min(maxOrbit, d));   // 탭 거리 = 궤도 크기
    var angle = Math.atan2(dy, dx);                        // 탭 방향 = 시작 위치
    satellites.push({
      orbitR: orbitR,
      angle: angle,
      speed: (0.02 + (idx % 4) * 0.003) * (BASE_R / orbitR + 0.6), // 안쪽 궤도가 더 빠름(일관된 각속도감)
      size: 7
    });
    synth(420 + idx * 18, { type: 'triangle', attack: 0.004, decay: 0.06, sustain: 0.3, release: 0.1, gain: 0.14 });
    hintEl.style.opacity = '0';
  }

  function spawnDebris() {
    var minDim = Math.min(W, H);
    var maxR = minDim * 0.46;
    var edgeR = maxR + 20 + Math.random() * 30;
    var a = Math.random() * Math.PI * 2;
    debris.push({
      x: cx + Math.cos(a) * edgeR,
      y: cy + Math.sin(a) * edgeR,
      angle: a,
      r: 4 + Math.random() * 3
    });
  }

  var spawnTimer = 0;
  var particles = []; // simple collect-burst particles

  function update(dt) {
    if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt * 1.2);
    updateTweens(dt);
    scoreEl.style.transform = 'scale(' + scorePop.scale + ')';
    if (state !== 'playing') return;
    t += dt;
    // 에너지가 낮을 때만 서서히 회복 (완전히 막히지 않되, 놀면서 최대치로 못 채움)
    if (energy < LOW_ENERGY) {
      regenTimer += dt;
      if (regenTimer > 2.5) { regenTimer = 0; energy = Math.min(ENERGY_MAX, energy + 1); renderEnergy(); }
    }
    spawnTimer += dt;
    var spawnInterval = Math.max(0.35, 1.1 - satellites.length * 0.03);
    if (spawnTimer > spawnInterval) {
      spawnTimer = 0;
      spawnDebris();
    }

    for (var i = 0; i < satellites.length; i++) {
      satellites[i].angle += satellites[i].speed;
    }

    for (var d = debris.length - 1; d >= 0; d--) {
      var deb = debris[d];
      // pull debris slowly inward toward center
      var dx = cx - deb.x, dy = cy - deb.y;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;
      deb.x += (dx / dist) * 22 * dt;
      deb.y += (dy / dist) * 22 * dt;

      // check collision vs each satellite position
      var collected = false;
      for (var s = 0; s < satellites.length; s++) {
        var sat = satellites[s];
        var sx = cx + Math.cos(sat.angle) * sat.orbitR;
        var sy = cy + Math.sin(sat.angle) * sat.orbitR;
        var ddx = sx - deb.x, ddy = sy - deb.y;
        var dd = Math.sqrt(ddx * ddx + ddy * ddy);
        if (dd < sat.size + deb.r + 6) {
          collected = true;
          break;
        }
      }
      if (collected) {
        debris.splice(d, 1);
        score += 1;
        scoreEl.textContent = score;
        energy = Math.min(ENERGY_MAX, energy + 1);  // 파편 수집 = 에너지 획득 (수집 루프 = 발사 자원)
        renderEnergy();
        popScore();
        synth(760 + Math.random() * 120, { type: 'sine', attack: 0.002, decay: 0.05, sustain: 0.3, release: 0.08, gain: 0.1 });
        var burstCount = 5;
        for (var b = 0; b < burstCount; b++) {
          var ba = Math.random() * Math.PI * 2;
          var bs = 40 + Math.random() * 60;
          particles.push({
            x: deb.x, y: deb.y,
            vx: Math.cos(ba) * bs, vy: Math.sin(ba) * bs,
            life: 0.3 + Math.random() * 0.15, maxLife: 0.4, r: 2 + Math.random() * 1.5
          });
        }
      } else if (dist < 18) {
        debris.splice(d, 1);
        miss();
      }
    }

    for (var p = particles.length - 1; p >= 0; p--) {
      var pt = particles[p];
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      pt.vx *= 0.92; pt.vy *= 0.92;
      pt.life -= dt;
      if (pt.life <= 0) particles.splice(p, 1);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    if (shake.mag > 0.02) {
      ctx.translate((Math.random() * 2 - 1) * shake.mag, (Math.random() * 2 - 1) * shake.mag);
    }

    // orbit rings
    ctx.strokeStyle = 'rgba(120,160,255,0.15)';
    ctx.lineWidth = 1;
    for (var i = 0; i < satellites.length; i++) {
      ctx.beginPath();
      ctx.arc(cx, cy, satellites[i].orbitR, 0, Math.PI * 2);
      ctx.stroke();
    }

    // core
    var pulse = 1 + Math.sin(t * 2) * 0.05;
    var coreR = 16 * pulse;
    var grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 3);
    grad.addColorStop(0, 'rgba(150,200,255,0.9)');
    grad.addColorStop(1, 'rgba(150,200,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, coreR * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#dff0ff';
    ctx.beginPath();
    ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
    ctx.fill();

    // debris
    ctx.fillStyle = '#ff8f6b';
    for (var d = 0; d < debris.length; d++) {
      var deb = debris[d];
      ctx.beginPath();
      ctx.arc(deb.x, deb.y, deb.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // satellites
    for (var s = 0; s < satellites.length; s++) {
      var sat = satellites[s];
      var sx = cx + Math.cos(sat.angle) * sat.orbitR;
      var sy = cy + Math.sin(sat.angle) * sat.orbitR;
      ctx.fillStyle = '#9fe3ff';
      ctx.beginPath();
      ctx.arc(sx, sy, sat.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(159,227,255,0.5)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx, sy, sat.size + 4, 0, Math.PI * 2);
      ctx.stroke();
    }

    // collect burst particles
    for (var p = 0; p < particles.length; p++) {
      var pt = particles[p];
      var alpha = Math.max(0, pt.life / pt.maxLife);
      ctx.fillStyle = 'rgba(255,220,180,' + alpha + ')';
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();

    if (flashAlpha > 0) {
      ctx.fillStyle = 'rgba(255,60,40,' + flashAlpha + ')';
      ctx.fillRect(0, 0, W, H);
    }
  }

  var lastTime = null;
  var rafId = null;
  function loop(now) {
    if (!running) return;
    if (lastTime == null) lastTime = now;
    var dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    update(dt);
    draw();
    rafId = requestAnimationFrame(loop);
  }

  // pause the rAF loop when backgrounded: saves battery on mobile and avoids
  // a stale lastTime producing a jump on return (dt is reset, not just clamped)
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      if (rafId != null) cancelAnimationFrame(rafId);
      rafId = null;
    } else if (rafId == null) {
      lastTime = null;
      rafId = requestAnimationFrame(loop);
    }
  });

  var activePointerId = null;
  function onTap(e) {
    e.preventDefault();
    // ignore extra fingers so a two-finger tap doesn't double-fire on mobile
    if (activePointerId != null) return;
    activePointerId = e.pointerId;
    if (state === 'gameover') {
      ensureAudio();
      restart();
    } else {
      var rect = canvas.getBoundingClientRect();
      var tx = e.clientX - rect.left, ty = e.clientY - rect.top;
      var cost = launchCost();
      if (energy >= cost) {
        addSatellite(tx, ty);
        energy -= cost;
        renderEnergy();
      } else {
        // 에너지 부족: 발사 거부 (무제한 탭 차단)
        ensureAudio();
        triggerShake(5, 0.18);
        synth(180, { type: 'square', freqEnd: 120, attack: 0.002, decay: 0.05, sustain: 0.2, release: 0.06, gain: 0.08 });
      }
    }
  }
  function onRelease(e) {
    if (e.pointerId === activePointerId) activePointerId = null;
  }
  canvas.addEventListener('pointerdown', onTap, { passive: false });
  canvas.addEventListener('pointerup', onRelease, { passive: false });
  canvas.addEventListener('pointercancel', onRelease, { passive: false });

  renderLives();
  renderEnergy();
  window.__GAME = { score: 0, state: state, energy: energy };
  setInterval(function () {
    window.__GAME.score = score;
    window.__GAME.state = state;
    window.__GAME.energy = energy;
  }, 200);

  rafId = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
